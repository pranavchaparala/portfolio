<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margiela Minimal Peek</title>
    <style>
        :root {
            --shadow-x: 0px;
            --shadow-y: 0px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* The background image seen through the holes */
        .background-layer {
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* The soft shadow layer that moves inside the holes */
        .shadow-layer {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: rgba(0, 0, 0, 0.6);
            -webkit-mask: url(#hole-mask);
            mask: url(#hole-mask);
            /* This creates the soft peeking effect */
            filter: blur(20px);
            transform: translate(var(--shadow-x), var(--shadow-y));
            pointer-events: none;
        }

        /* The top white layer with static holes */
        .top-layer {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 3;
            -webkit-mask: url(#hole-mask);
            mask: url(#hole-mask);
            pointer-events: none;
        }

        /* UI Hint */
        .hint {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            font-family: sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            color: #aaa;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <div class="shadow-layer"></div>
    <div class="top-layer"></div>
    <div class="hint">Move mouse to shift depth</div>

    <svg width="100%" height="100%" style="position: absolute;">
        <defs>
            <mask id="hole-mask">
                <rect width="100%" height="100%" fill="white" />
                <circle cx="20%" cy="25%" r="80" fill="black" />
                <circle cx="50%" cy="20%" r="60" fill="black" />
                <circle cx="80%" cy="35%" r="90" fill="black" />
                <circle cx="35%" cy="60%" r="70" fill="black" />
                <circle cx="65%" cy="55%" r="100" fill="black" />
                <circle cx="15%" cy="85%" r="50" fill="black" />
                <circle cx="50%" cy="85%" r="85" fill="black" />
                <circle cx="85%" cy="80%" r="70" fill="black" />
            </mask>
        </defs>
    </svg>

    <script>
        const root = document.documentElement;

        const handleMove = (e) => {
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;

            // Calculate distance from center to create the shadow angle
            const moveX = (x / window.innerWidth - 0.5) * 40; // max 40px shift
            const moveY = (y / window.innerHeight - 0.5) * 40;

            root.style.setProperty('--shadow-x', `${moveX}px`);
            root.style.setProperty('--shadow-y', `${moveY}px`);
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
    </script>
</body>
</html>
