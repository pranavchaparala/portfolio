<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground | Pranav Chaparala</title>
<style>

/* ── RESET & BASE (mirrors style.css exactly) ──────────────── */
* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
  cursor: none;
}
body {
  background-color: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  font-size: 18px;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ── CUSTOM CURSOR ─────────────────────────────────────────── */
#cursor-dot {
  width: 12px; height: 12px;
  border: 1.5px solid #000;
  background: transparent;
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition:
    width  0.25s cubic-bezier(0.16,1,0.3,1),
    height 0.25s cubic-bezier(0.16,1,0.3,1),
    background-color 0.2s ease,
    border-color 0.2s ease;
}
body.cursor-ready #cursor-dot { background: #000; }
body.cursor-hover #cursor-dot { width: 8px; height: 8px; }

/* ── NAVBAR (matches style.css) ───────────────────────────── */
.main-nav {
  position: fixed;
  top: 65%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 32px;
  z-index: 10000;
  transition: opacity 0.4s ease, pointer-events 0.4s;
}
.main-nav a {
  text-decoration: none;
  color: #000;
  font-size: 18px;
  font-weight: 400;
  transition: opacity 0.2s ease;
  white-space: nowrap;
}
.main-nav a:hover { opacity: 0.4; }
.active-link {
  text-decoration: underline !important;
  text-underline-offset: 4px;
}
body.popup-open .main-nav {
  opacity: 0;
  pointer-events: none;
}

/* ── PAGE DISSOLVE (matches style.css) ────────────────────── */
@keyframes contentDissolve {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
#scene {
  animation: contentDissolve 2.4s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* ── SCENE ─────────────────────────────────────────────────── */
#scene {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: row;
  gap: 12px;
  padding: 0 6px;
  overflow: hidden;
  transition: filter 0.5s ease;
  will-change: filter;
}
#scene.blurred {
  filter: blur(16px) brightness(0.45);
  transform: scale(1.02);
  transition: filter 0.5s ease, transform 0.5s ease;
}

/* ── COLUMN ────────────────────────────────────────────────── */
.col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  will-change: transform;
  /* overflow deliberately not hidden — cropping is handled by scene */
}

/* ── CARD ──────────────────────────────────────────────────── */
.card {
  width: 100%;
  aspect-ratio: 3 / 4;
  flex-shrink: 0;
  background: #f0f0f0;
  overflow: hidden;
  position: relative;
  cursor: none;
}
.card-media {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1),
              opacity 0.3s ease;
  opacity: 0.82;
}
.card:hover .card-media {
  transform: scale(1.05);
  opacity: 1;
}
.card-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 36px 10px 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.58) 0%, transparent 100%);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.88);
  font-weight: 400;
  opacity: 0;
  transition: opacity 0.22s ease;
}
.card:hover .card-label { opacity: 1; }

/* ── POPUP BACKDROP ────────────────────────────── */
#popup {
  position: fixed;
  inset: 0;
  z-index: 20000;
  pointer-events: none;
  background: rgba(255,255,255,0);
  transition: background 0.55s ease;
}
#popup.active {
  pointer-events: auto;
  background: rgba(255,255,255,0.72);
}

/* ── ZOOMED CARD (animates from card rect to viewport center) ─ */
#zoom-card {
  position: fixed;
  z-index: 20001;
  overflow: hidden;
  background: #111;
  opacity: 0;
  pointer-events: none;
  will-change: top, left, width, height, opacity;
}
#zoom-card.animating {
  transition:
    top    0.65s cubic-bezier(0.76, 0, 0.24, 1),
    left   0.65s cubic-bezier(0.76, 0, 0.24, 1),
    width  0.65s cubic-bezier(0.76, 0, 0.24, 1),
    height 0.65s cubic-bezier(0.76, 0, 0.24, 1),
    opacity 0.3s ease;
}
#zoom-card.shrinking {
  transition:
    top    0.5s cubic-bezier(0.76, 0, 0.24, 1),
    left   0.5s cubic-bezier(0.76, 0, 0.24, 1),
    width  0.5s cubic-bezier(0.76, 0, 0.24, 1),
    height 0.5s cubic-bezier(0.76, 0, 0.24, 1),
    opacity 0.25s ease 0.25s;
}
#zoom-card video,
#zoom-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

/* ── INFO STRIP (fades in below zoomed card) ─────────────── */
#zoom-info {
  position: fixed;
  z-index: 20002;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
  white-space: nowrap;
}
#zoom-info.visible { opacity: 1; }
.zoom-title {
  font-size: 18px;
  font-weight: 500;
  color: #000;
  letter-spacing: -0.01em;
  margin-bottom: 5px;
}
.zoom-desc {
  font-size: 13px;
  color: #666;
  line-height: 1.5;
  max-width: 420px;
  margin: 0 auto 14px;
  white-space: normal;
}
.zoom-hint {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #aaa;
}
/* Mobile */
@media (max-width: 768px) {
  .main-nav {
    top: 55% !important;
    gap: 16px !important;
    flex-wrap: wrap !important;
    width: 90vw !important;
    justify-content: center !important;
  }
  * { cursor: auto !important; }
  #cursor-dot { display: none; }
}

</style>
</head>
<body>

<div id="cursor-dot"></div>

<nav class="main-nav">
  <a href="index.html" class="brand">Pranav Chaparala</a>
  <a href="play.html" class="active-link">Play</a>
  <a href="research.html">Research</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<div id="scene"></div>

<!-- Backdrop (click anywhere to close) -->
<div id="popup"></div>

<!-- Zoomed card (position set by JS) -->
<div id="zoom-card"></div>

<!-- Info strip below the card -->
<div id="zoom-info">
  <h2 class="zoom-title" id="zoom-title"></h2>
  <p  class="zoom-desc"  id="zoom-desc"></p>
  <div class="zoom-hint">Click anywhere to return</div>
</div>

<script src="playgroundData.js"></script>
<script>
// playgroundData is now loaded from playgroundData.js
// Expected shape per item: { title, description, filename, videoFilename? }
// filename = thumbnail (image or muted looping .mp4)
// videoFilename = optional full audio video shown in popup

// ── CONFIG ────────────────────────────────────────────────────
// Responsive column count based on viewport width
function getColCount() {
  const w = window.innerWidth;
  if (w >= 1400) return 8;
  if (w >= 1100) return 6;
  if (w >= 768)  return 5;
  if (w >= 520)  return 4;
  if (w >= 360)  return 3;
  return 2;
}

const GAP        = 12;
const FRICTION   = 0.92;   // higher = slower coast after scroll
const SCROLL_IN  = 0.28;   // overall input sensitivity (lower = slower movement)
const SLOW_MULT  = 0.28;   // even columns — noticeably slower
const FAST_MULT  = 1.0;    // odd  columns — full speed

// ── BUILD COLUMNS ─────────────────────────────────────────────
const scene   = document.getElementById('scene');
let colEls    = [];
let offsets   = [];
let COLS      = getColCount();

function buildGrid() {
  // Tear down old columns
  scene.innerHTML = '';
  colEls  = [];
  offsets = [];
  COLS    = getColCount();

  const colData = Array.from({ length: COLS }, () => []);
  playgroundData.forEach((item, i) => colData[i % COLS].push(item));

  colData.forEach((items, ci) => {
    const col = document.createElement('div');
    col.className = 'col';

    // Pad then triple for seamless infinite loop
    let pool = [...items];
    while (pool.length < 8) pool = [...pool, ...items];
    const tripled = [...pool, ...pool, ...pool];

    tripled.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.title    = item.title        || '';
      card.dataset.desc     = item.description  || '';
      card.dataset.filename = item.filename     || '';
      card.dataset.video    = item.videoFilename || '';

      const assetPath = `playgroundassets/${item.filename}`;
      const isVideo   = item.filename && item.filename.toLowerCase().endsWith('.mp4');

      if (isVideo) {
        // Muted looping video as the card thumbnail
        const vid = document.createElement('video');
        vid.src         = assetPath;
        vid.autoplay    = true;
        vid.loop        = true;
        vid.muted       = true;
        vid.playsInline = true;
        vid.className   = 'card-media';
        card.appendChild(vid);
      } else {
        const img     = document.createElement('img');
        img.src       = assetPath;
        img.alt       = item.title || '';
        img.loading   = 'lazy';
        img.className = 'card-media';
        img.onerror   = function() {
          this.onerror = null;
          this.src = `https://picsum.photos/seed/${encodeURIComponent(item.filename || Math.random())}/400/533`;
        };
        card.appendChild(img);
      }

      const lbl       = document.createElement('div');
      lbl.className   = 'card-label';
      lbl.textContent = item.title || '';
      card.appendChild(lbl);

      card.addEventListener('click', openPopup);
      col.appendChild(card);
    });

    offsets.push(0);
    colEls.push(col);
    scene.appendChild(col);

    // Re-attach cursor hover listeners for new cards
    col.querySelectorAll('.card').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });
  });

  // Stagger so odd columns start visually offset
  requestAnimationFrame(() => requestAnimationFrame(() => {
    colEls.forEach((col, ci) => {
      const oneSet = col.scrollHeight / 3;
      offsets[ci] = (ci % 2 === 0) ? -(oneSet * 0.08) : -(oneSet * 0.42);
      col.style.transform = `translateY(${offsets[ci]}px)`;
    });
  }));
}

buildGrid();

// Rebuild on resize (debounced)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (getColCount() !== COLS) buildGrid();
  }, 200);
});

// ── SCROLL PHYSICS ────────────────────────────────────────────
let velocity = 0;
let rafId    = null;

window.addEventListener('wheel', (e) => {
  e.preventDefault();
  velocity += e.deltaY * SCROLL_IN;
  if (!rafId) rafId = requestAnimationFrame(tick);
}, { passive: false });

// Touch
let touchY = 0;
window.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchmove',  e => {
  const dy = touchY - e.touches[0].clientY;
  touchY = e.touches[0].clientY;
  velocity += dy * SCROLL_IN * 1.4;
  if (!rafId) rafId = requestAnimationFrame(tick);
}, { passive: true });

function tick() {
  if (Math.abs(velocity) < 0.03) {
    velocity = 0; rafId = null; return;
  }

  colEls.forEach((col, ci) => {
    // All columns move in the SAME direction; alternates just move at different speeds
    const mult = (ci % 2 === 0) ? SLOW_MULT : FAST_MULT;
    offsets[ci] += velocity * mult;

    // Seamless wrap within tripled content
    const oneSet = col.scrollHeight / 3;
    if (offsets[ci] < -(oneSet * 2)) offsets[ci] += oneSet;
    if (offsets[ci] > 0)             offsets[ci] -= oneSet;

    col.style.transform = `translateY(${offsets[ci]}px)`;
  });

  velocity *= FRICTION;
  rafId = requestAnimationFrame(tick);
}

// ── POPUP / ZOOM ─────────────────────────────────────────
const popup     = document.getElementById('popup');
const zoomCard  = document.getElementById('zoom-card');
const zoomInfo  = document.getElementById('zoom-info');
const zoomTitle = document.getElementById('zoom-title');
const zoomDesc  = document.getElementById('zoom-desc');

// Target card dimensions when zoomed in (px)
const ZOOM_W = Math.min(360, window.innerWidth * 0.80);
const ZOOM_H = ZOOM_W * (4 / 3);   // keep 3:4 ratio → show as 4:3 landscape
const INFO_GAP = 24;                // gap between card bottom and info strip

function openPopup(e) {
  const card     = e.currentTarget;
  const filename = card.dataset.filename;
  const videoFile= card.dataset.video;
  const assetPath= `playgroundassets/${filename}`;
  const isVid    = filename && filename.toLowerCase().endsWith('.mp4');

  // Measure where the card lives right now
  const r = card.getBoundingClientRect();

  // Teleport zoom-card to the exact card position first (no transition)
  zoomCard.className = '';   // remove animating/shrinking
  zoomCard.style.cssText = `
    top:    ${r.top}px;
    left:   ${r.left}px;
    width:  ${r.width}px;
    height: ${r.height}px;
    opacity: 1;
  `;

  // Fill with media
  zoomCard.innerHTML = '';
  if (videoFile) {
    const vid = document.createElement('video');
    vid.src = `playgroundassets/${videoFile}`;
    vid.autoplay = true; vid.loop = true; vid.muted = false; vid.playsInline = true;
    vid.play().catch(() => { vid.muted = true; vid.play(); });
    zoomCard.appendChild(vid);
  } else if (isVid) {
    const vid = document.createElement('video');
    vid.src = assetPath; vid.autoplay = true; vid.loop = true;
    vid.muted = true; vid.playsInline = true;
    zoomCard.appendChild(vid);
  } else {
    const img = document.createElement('img');
    img.src = assetPath; img.alt = card.dataset.title;
    img.onerror = () => { img.src = `https://picsum.photos/seed/${encodeURIComponent(filename)}/640/480`; };
    zoomCard.appendChild(img);
  }

  // Force reflow so the starting position is painted before we add the transition
  zoomCard.getBoundingClientRect();

  // Target: centered in viewport
  const destTop  = (window.innerHeight - ZOOM_H) / 2;
  const destLeft = (window.innerWidth  - ZOOM_W) / 2;

  // Info strip position: just below the zoomed card
  zoomInfo.style.top = `${destTop + ZOOM_H + INFO_GAP}px`;
  zoomTitle.textContent = card.dataset.title;
  zoomDesc.textContent  = card.dataset.desc;

  // Animate to center
  zoomCard.classList.add('animating');
  zoomCard.style.top    = `${destTop}px`;
  zoomCard.style.left   = `${destLeft}px`;
  zoomCard.style.width  = `${ZOOM_W}px`;
  zoomCard.style.height = `${ZOOM_H}px`;

  // Show backdrop + info after card starts moving
  popup.classList.add('active');
  scene.classList.add('blurred');
  document.body.classList.add('popup-open');
  setTimeout(() => zoomInfo.classList.add('visible'), 420);
}

function closePopup() {
  // Hide info immediately
  zoomInfo.classList.remove('visible');

  // Shrink card back (just shrink to center, no need to reverse to origin)
  zoomCard.className = 'shrinking';
  const midW = ZOOM_W * 0.35;
  const midH = ZOOM_H * 0.35;
  zoomCard.style.top    = `${(window.innerHeight - midH) / 2}px`;
  zoomCard.style.left   = `${(window.innerWidth  - midW) / 2}px`;
  zoomCard.style.width  = `${midW}px`;
  zoomCard.style.height = `${midH}px`;
  zoomCard.style.opacity = '0';

  popup.classList.remove('active');
  scene.classList.remove('blurred');
  document.body.classList.remove('popup-open');

  // Clean up after transition
  setTimeout(() => {
    zoomCard.innerHTML = '';
    zoomCard.className = '';
    zoomCard.style.cssText = '';
    zoomCard.querySelectorAll('video').forEach(v => { v.pause(); v.src = ''; });
  }, 550);
}

// Click backdrop to close
popup.addEventListener('click', closePopup);
// Click the zoomed card itself does NOT close
zoomCard.addEventListener('click', e => e.stopPropagation());
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

// ── CUSTOM CURSOR ─────────────────────────────────────────────
const dot = document.getElementById('cursor-dot');
let mx = -200, my = -200, cx = -200, cy = -200;

window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

(function loop() {
  cx += (mx - cx) * 0.15;
  cy += (my - cy) * 0.15;
  dot.style.left = cx + 'px';
  dot.style.top  = cy + 'px';
  requestAnimationFrame(loop);
})();

setTimeout(() => document.body.classList.add('cursor-ready'), 200);

// Nav links cursor hover
document.querySelectorAll('a').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
});
</script>
</body>
</html>
