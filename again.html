<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#IWD2020 — Apple</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  cursor: default;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 44px;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(20px) saturate(180%);
  display: flex; align-items: center; justify-content: center;
  gap: 28px;
}
nav a {
  color: rgba(255,255,255,0.82);
  font-size: 12px;
  text-decoration: none;
  letter-spacing: 0.01em;
  transition: color 0.15s;
}
nav a:hover { color: #fff; }
.nav-apple { font-size: 17px; }

/* CANVAS LAYER */
#scene {
  position: fixed;
  inset: 0;
  will-change: transform;
  transition: transform 0.08s ease-out;
}

/* CENTER TEXT */
.hero-center {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 50;
  text-align: center;
  pointer-events: none;
  user-select: none;
}
.hero-tag {
  font-size: 14px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.65);
  margin-bottom: 14px;
}
.hero-headline {
  font-size: clamp(40px, 5.8vw, 82px);
  font-weight: 700;
  line-height: 1.06;
  letter-spacing: -0.025em;
  color: #fff;
  margin-bottom: 24px;
}
.hero-watch {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 17px;
  color: rgba(255,255,255,0.85);
  cursor: pointer;
  pointer-events: all;
}
.hero-watch svg { width: 22px; height: 22px; }

/* PHOTO CARDS */
.photo {
  position: absolute;
  border-radius: 4px;
  overflow: hidden;
  will-change: transform;
  cursor: pointer;
  transition: filter 0.3s ease;
  filter: brightness(0.85) grayscale(1);
}
.photo:hover {
  filter: brightness(1) grayscale(1);
  z-index: 10;
}

.photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
  user-select: none;
}

/* Hover overlay with text */
.photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.2) 55%, transparent 100%);
  opacity: 0;
  transition: opacity 0.3s ease;
  display: flex; align-items: flex-end;
  padding: 18px 16px;
}
.photo:hover .photo-overlay { opacity: 1; }

.photo-text {
  font-size: 13.5px;
  line-height: 1.5;
  color: #fff;
  font-weight: 400;
}
.photo-text strong {
  font-weight: 700;
  display: block;
  margin-bottom: 2px;
  font-size: 14.5px;
}

/* scroll arrow */
.scroll-hint {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 100; opacity: 0.6;
  animation: bounce 2s ease infinite;
}
@keyframes bounce {
  0%,100%{ transform: translateX(-50%) translateY(0); }
  50%{ transform: translateX(-50%) translateY(6px); }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="nav-apple">&#63743;</a>
  <a href="#">Store</a>
  <a href="#">Mac</a>
  <a href="#">iPad</a>
  <a href="#">iPhone</a>
  <a href="#">Watch</a>
  <a href="#">Vision</a>
  <a href="#">AirPods</a>
  <a href="#">TV &amp; Home</a>
  <a href="#">Entertainment</a>
  <a href="#">Accessories</a>
  <a href="#">Support</a>
</nav>

<!-- PARALLAX SCENE -->
<div id="scene"></div>

<!-- CENTER TEXT (fixed, not parallaxed) -->
<div class="hero-center">
  <p class="hero-tag">#IWD2020</p>
  <h1 class="hero-headline">To the women<br>who are changing<br>everything.</h1>
  <div class="hero-watch">
    Watch the film
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
    </svg>
  </div>
</div>

<!-- SCROLL ARROW -->
<div class="scroll-hint">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
    <polyline points="6,9 12,15 18,9"/>
  </svg>
</div>

<script>
// ── Women data ──────────────────────────────────────────────────────────────
const women = [
  { name: "Malala Yousafzai",       desc: "The youngest Nobel laureate fights for every girl's right to education.",                                     img: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=400&q=80&sat=-100" },
  { name: "Tarana Burke",           desc: "Founder of The 'me too.' Movement, giving countless people a path toward healing.",                            img: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&q=80&sat=-100" },
  { name: "Lady Gaga",              desc: "Her Born This Way Foundation builds a kinder, braver world for young people.",                                 img: "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=400&q=80&sat=-100" },
  { name: "Ava DuVernay",           desc: "Director of Selma and When They See Us, leading conversations on race and equality.",                           img: "https://images.unsplash.com/photo-1543610892-0b1f7e6d8ac1?w=400&q=80&sat=-100" },
  { name: "Alicia Keys",            desc: "15-time GRAMMY® winner celebrated for her musicianship, creativity, and philanthropy.",                         img: "https://images.unsplash.com/photo-1598550880863-4e8aa3d0edb4?w=400&q=80&sat=-100" },
  { name: "Greta Gerwig",           desc: "Writer-director of Lady Bird and Little Women, expanding the stories Hollywood tells.",                         img: "https://images.unsplash.com/photo-1554151228-14d9def656e4?w=400&q=80&sat=-100" },
  { name: "Gloria Steinem",         desc: "Founder of Ms. magazine and legendary spokesperson for the American feminist movement.",                        img: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400&q=80&sat=-100" },
  { name: "Black Mamba Unit",       desc: "Unarmed, female-run anti-poaching unit protecting endangered species in South Africa.",                         img: "https://images.unsplash.com/photo-1530785602389-07594beb8b73?w=400&q=80&sat=-100" },
  { name: "Marie Kondo",            desc: "Sparked a global tidying revolution with her best-selling books and Netflix series.",                           img: "https://images.unsplash.com/photo-1557296387-5358ad7997bb?w=400&q=80&sat=-100" },
  { name: "Megan Rapinoe",          desc: "World Cup champion who fought alongside teammates for equal pay in women's soccer.",                            img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&q=80&sat=-100" },
  { name: "Olivia Wilde",           desc: "Director of Booksmart and a prominent voice for gender equality in the film industry.",                         img: "https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?w=400&q=80&sat=-100" },
  { name: "Lilly Singh",            desc: "First LGBTQ+ woman to host a U.S. network late-night show in over 30 years.",                                  img: "https://images.unsplash.com/photo-1567532939604-b6b5b0db2604?w=400&q=80&sat=-100" },
  { name: "Kwak Sin Ae",            desc: "Producer of Parasite — the first non-English film to win the Academy Award for Best Picture.",                  img: "https://images.unsplash.com/photo-1601412436009-d964bd02edbc?w=400&q=80&sat=-100" },
  { name: "DJ Switch",              desc: "12-year-old Ghanaian DJ who founded a foundation providing girls with better educational opportunities.",        img: "https://images.unsplash.com/photo-1598966739654-5e9a252d8c32?w=400&q=80&sat=-100" },
  { name: "Elizabeth Banks",        desc: "Award-winning actor and director who weaves feminist ideas into every project.",                                 img: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400&q=80&sat=-100" },
];

// ── Scattered layout positions (% of a large virtual canvas 3000×2200) ──────
// These mimic Apple's staggered, asymmetric mosaic look
const layout = [
  { x:  40, y:  20, w: 270, h: 190, depth: 0.04 },  // top-left area
  { x: 310, y:   5, w: 310, h: 220, depth: 0.06 },  // top-center
  { x: 750, y:  15, w: 190, h: 190, depth: 0.03 },  // top-right-ish
  { x:1060, y:   5, w: 300, h: 220, depth: 0.05 },  // top far right

  { x:  -5, y: 340, w: 100, h: 280, depth: 0.08 },  // left edge mid
  { x: 120, y: 290, w: 290, h: 310, depth: 0.05 },  // left-mid
  { x: 820, y: 300, w: 220, h: 230, depth: 0.04 },  // right-mid
  { x:1070, y: 310, w: 320, h: 350, depth: 0.07 },  // far right mid

  { x:  -5, y: 590, w: 260, h: 220, depth: 0.06 },  // bottom-left
  { x: 310, y: 610, w: 150, h: 230, depth: 0.04 },  // bottom-center-left
  { x: 590, y: 590, w: 260, h: 240, depth: 0.05 },  // bottom-center
  { x: 980, y: 600, w: 180, h: 210, depth: 0.03 },  // bottom-right-ish
  { x:1175, y: 590, w: 235, h: 220, depth: 0.06 },  // bottom far right

  { x: 475, y:  80, w: 100, h: 140, depth: 0.09 },  // small top-center
  { x: 690, y: 380, w: 100, h: 130, depth: 0.08 },  // small mid
];

const scene = document.getElementById('scene');
const VW = 1440, VH = 820; // virtual canvas size

function buildScene() {
  const sw = window.innerWidth, sh = window.innerHeight;
  const scaleX = sw / VW, scaleY = sh / VH;

  scene.innerHTML = '';

  women.slice(0, layout.length).forEach((woman, i) => {
    const pos = layout[i];
    const el = document.createElement('div');
    el.className = 'photo';
    el.style.left   = (pos.x * scaleX) + 'px';
    el.style.top    = (44 + pos.y * scaleY) + 'px';
    el.style.width  = (pos.w * scaleX) + 'px';
    el.style.height = (pos.h * scaleY) + 'px';
    el.dataset.depth = pos.depth;

    const img = document.createElement('img');
    img.src = woman.img;
    img.alt = woman.name;
    img.loading = 'lazy';

    const overlay = document.createElement('div');
    overlay.className = 'photo-overlay';
    overlay.innerHTML = `<p class="photo-text"><strong>${woman.name}</strong>${woman.desc}</p>`;

    el.appendChild(img);
    el.appendChild(overlay);
    scene.appendChild(el);
  });
}

buildScene();
window.addEventListener('resize', buildScene);

// ── Mouse parallax ───────────────────────────────────────────────────────────
let mouseX = 0, mouseY = 0;
let curX = 0, curY = 0;
const STRENGTH = 28; // max px shift for scene

document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;  // -1 to 1
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function tick() {
  curX += (mouseX - curX) * 0.07;
  curY += (mouseY - curY) * 0.07;

  const photos = scene.querySelectorAll('.photo');
  photos.forEach(photo => {
    const depth = parseFloat(photo.dataset.depth) || 0.05;
    const dx = curX * STRENGTH * depth * 10;
    const dy = curY * STRENGTH * depth * 10;
    photo.style.transform = `translate(${dx}px, ${dy}px)`;
  });

  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
