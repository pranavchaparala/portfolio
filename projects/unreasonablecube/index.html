<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unreasonable Cube | Pranav Chaparala</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../project.css">
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
    <meta name="project-img" content="clanx.png">
</head>
<body>
    <a href="../../index.html" class="back-btn-center"><span>←</span> Go Back</a>
    <nav id="work-list">
        <span class="section-label">Work</span>
        <ul></ul>
    </nav>
    <div class="page-content">
        <main id="main-content">
            <div class="case-study-container" id="project-container">
                <h1>Unreasonable Cube</h1>
                <p>Content coming soon.</p>
            </div>
        </main>
    </div>
    <div class="nav-rail" id="rail">
        <div id="scroll-indicator"></div>
        <div id="mini-map-content"></div>
    </div>
    <script src="../../projects.js"></script>
    <script src="../../cursor.js"></script>
    <script src="../../components.js?v=2"></script>
    <script>
        const lenis = new Lenis({ duration: 1.2, lerp: 0.1 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        const mainContent = document.getElementById('main-content');
        const miniMap = document.getElementById('mini-map-content');
        const indicator = document.getElementById('scroll-indicator');
        const rail = document.getElementById('rail');
        miniMap.appendChild(mainContent.cloneNode(true));
        function syncLayout() {
            const pageHeight = mainContent.scrollHeight;
            const scaleFactor = rail.clientWidth / window.innerWidth;
            miniMap.style.transform = "scale(" + scaleFactor + ")";
            rail.style.height = Math.min(pageHeight * scaleFactor, window.innerHeight * 0.5) + "px";
            indicator.style.height = (rail.clientHeight * (window.innerHeight / pageHeight)) + "px";
        }
        const resizeObserver = new ResizeObserver(() => syncLayout());
        resizeObserver.observe(mainContent);
        window.addEventListener('load', () => { syncLayout(); setTimeout(syncLayout, 500); });
        window.addEventListener('resize', syncLayout);
        syncLayout();
        lenis.on('scroll', (e) => {
            const scrollPercent = e.progress;
            indicator.style.transform = "translateY(" + (scrollPercent * (rail.clientHeight - indicator.clientHeight)) + "px)";
            const scaleFactor = rail.clientWidth / window.innerWidth;
            const scaledHeight = mainContent.scrollHeight * scaleFactor;
            if (scaledHeight > rail.clientHeight) {
                miniMap.style.top = "-" + ((scaledHeight - rail.clientHeight) * scrollPercent) + "px";
            }
        });
    </script>
</body>
</html>
