<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project | Pranav Chaparala</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

    <style>
        /* --- 1. RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            cursor: none;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden;
        }

        /* --- 2. NAVIGATION & TOP FADE --- */
        .top-nav-fade {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to bottom, #fff 0%, rgba(255, 255, 255, 0.9) 50%, rgba(255, 255, 255, 0) 100%);
            z-index: 1500;
            pointer-events: none;
        }

        .back-btn-center {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #000;
            text-decoration: none;
            z-index: 2100;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: opacity 0.2s ease;
            pointer-events: auto;
        }

        .back-btn-center:hover {
            opacity: 0.5;
        }

        #work-list {
            position: fixed;
            top: 40px;
            left: 45px;
            z-index: 2000;
        }

        .section-label {
            font-size: 18px;
            color: #919191;
            margin-bottom: 8px;
            display: block;
        }

        #work-list ul {
            list-style: none;
        }

        #work-list li {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
        }

        #work-list a {
            text-decoration: none;
            color: #000;
            transition: opacity 0.2s ease;
        }

        #work-list a:hover {
            opacity: 0.5;
        }

        .active-link {
            text-decoration: underline !important;
            text-underline-offset: 4px;
        }

        /* --- 3. LAYOUT & CONTENT --- */
        #main-content {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .case-study-container {
            width: 55vw;
            max-width: 1000px; /* from clanx max-width */
            padding-top: 120px;
            padding-bottom: 20vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: -0.01em;
            line-height: 1.1;
        }

        .body-text {
            font-size: 18px;
            line-height: 1.5;
            color: #000;
            margin-bottom: 24px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 10px 40px;
            margin: 40px 0 80px 0; /* Updated scale to match both clanx and echoes */
        }

        .meta-label {
            font-size: 18px;
            color: #919191;
        }

        .meta-value {
            font-size: 18px;
            color: #000;
            font-weight: 500;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            margin: 60px 0 20px;
            letter-spacing: 0.05em;
        }

        .list-section {
            margin-bottom: 40px;
            list-style: none;
        }

        .list-section li {
            font-size: 18px;
            line-height: 1.8;
            color: #000;
        }

        .list-section li::before {
            content: "• ";
            color: #919191;
            margin-right: 5px;
        }

        /* --- 4. MEDIA & GALLERY --- */
        .case-study-container img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 20px;
        }

        .full-img {
            width: 100%;
            height: auto;
            background: #f5f5f5;
            margin-bottom: 20px;
            display: block;
        }

        .img-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .gallery-item {
            aspect-ratio: 16/10;
            background: #f5f5f5;
            width: 100%;
        }

        /* --- 5. CURSOR STYLES --- */
        #cursor-svg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        #thread-path {
            fill: none;
            stroke: black;
            stroke-width: 1.2;
            stroke-linecap: round;
        }

        #cursor-square-loader {
            width: 14px;
            height: 14px;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-rect {
            width: 12px;
            height: 12px;
            border: 1.5px solid black;
            background: transparent;
            transition: background-color 0.8s ease;
        }

        body.loaded .loader-rect {
            background-color: black;
        }

        #open-project-label {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10001;
            display: none;
        }

        /* --- 6. MINI-MAP RAIL --- */
        .nav-rail {
            position: fixed;
            top: 50%;
            right: 45px;
            transform: translateY(-50%);
            width: 60px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 500;
            overflow: hidden;
        }

        #mini-map-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            transform-origin: top left;
            opacity: 0.25;
        }

        #scroll-indicator {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            border: 1px solid #000;
            z-index: 501;
        }

        /* --- 7. GLOBAL DISSOLVE --- */
        @keyframes contentDissolve {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-content {
            animation: contentDissolve 2.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: opacity, transform;
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn-center"><span>←</span> Go Back</a>

    <nav id="work-list">
        <span class="section-label">Work</span>
        <ul></ul>
    </nav>
    <div class="page-content">
        <main id="main-content">
            <div class="case-study-container" id="project-container">
                <!-- Content will be injected here via JS -->
            </div>
        </main>
    </div>

    <div class="nav-rail" id="rail">
        <div id="scroll-indicator"></div>
        <div id="mini-map-content"></div>
    </div>

    <!-- CMS Data injected first -->
    <script src="projects.js"></script>
    <script src="cursor.js"></script>
    <script src="components.js"></script>
    
    <script>
        // CMS Initialization
        function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            const project = projectsData.find(p => p.id === projectId);
            
            if (project) {
                document.title = project.title + " | Pranav Chaparala";
                document.getElementById('project-container').innerHTML = project.content;
            } else {
                document.getElementById('project-container').innerHTML = "<h1>Project Not Found</h1>";
            }
        }

        loadProject();

        // Lenis and Mini map setup
        const lenis = new Lenis({ duration: 1.2, lerp: 0.1 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const mainContent = document.getElementById('main-content');
        const miniMap = document.getElementById('mini-map-content');
        const indicator = document.getElementById('scroll-indicator');
        const rail = document.getElementById('rail');
        miniMap.appendChild(mainContent.cloneNode(true));

        function syncLayout() {
            const pageHeight = mainContent.scrollHeight;
            const scaleFactor = rail.clientWidth / window.innerWidth;
            miniMap.style.transform = `scale(${scaleFactor})`;
            rail.style.height = `${Math.min(pageHeight * scaleFactor, window.innerHeight * 0.5)}px`;
            indicator.style.height = `${rail.clientHeight * (window.innerHeight / pageHeight)}px`;
        }
        
        // Use ResizeObserver for more robust layout syncing when content changes/loads
        const resizeObserver = new ResizeObserver(() => syncLayout());
        resizeObserver.observe(mainContent);

        window.addEventListener('load', () => {
            syncLayout();
            // Allow iframes/images to load and resync
            setTimeout(syncLayout, 500); 
        });
        window.addEventListener('resize', syncLayout);
        syncLayout();

        lenis.on('scroll', (e) => {
            const scrollPercent = e.progress;
            indicator.style.transform = `translateY(${scrollPercent * (rail.clientHeight - indicator.clientHeight)}px)`;
            const scaleFactor = rail.clientWidth / window.innerWidth;
            const scaledHeight = mainContent.scrollHeight * scaleFactor;
            if (scaledHeight > rail.clientHeight) {
                miniMap.style.top = `-${(scaledHeight - rail.clientHeight) * scrollPercent}px`;
            }
        });
    </script>
</body>

</html>
