<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav Chaparala | Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fff; color: #000; overflow: hidden; height: 100vh; width: 100vw;
        }

        #bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #bg-blur { width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s; }
        #bg-blur img {
            width: 115%; height: 115%; position: absolute; top: -7.5%; left: -7.5%;
            object-fit: cover; filter: blur(20px) brightness(1.05);
        }

        nav, footer {
            position: fixed; width: 100%; padding: 30px 40px;
            display: flex; justify-content: space-between;
            z-index: 100; opacity: 0; font-size: 14px; font-weight: 500;
        }
        nav { top: 0; align-items: center; }
        footer { bottom: 0; align-items: flex-end; }
        nav a, footer a { text-decoration: none; color: inherit; }
        .nav-links a { margin-left: 20px; }

        /* Stage: cards are absolutely positioned here */
        #stage {
            position: fixed; inset: 0; z-index: 10; overflow: hidden;
        }
        .card {
            position: absolute;
            top: 50%;
            background: #f0f0f0; overflow: hidden; cursor: pointer;
            opacity: 0; /* hidden until revealed */
        }
        .card.p { width: 255px; height: 360px; margin-top: -180px; }
        .card.l { width: 390px; height: 255px; margin-top: -127px; }
        .pan {
            position: absolute; top: 0; left: -25%;
            width: 150%; height: 100%;
        }
        .pan img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Fake overlay for loading sequence */
        #overlay { position: fixed; inset: 0; z-index: 9999; pointer-events: none; }
        .fake {
            position: absolute; background: #f0f0f0; overflow: hidden;
            left: 50%; top: 50%;
            transform: scale(0); transform-origin: center center;
        }
        .fake.p { width: 255px; height: 360px; margin-left: -127px; margin-top: -180px; }
        .fake.l { width: 390px; height: 255px; margin-left: -195px; margin-top: -127px; }
        .fake .pan { position: absolute; top: 0; left: -25%; width: 150%; height: 100%; }
        .fake .pan img { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
</head>
<body>
<div id="bg"><div id="bg-blur"><img id="bg-img" src=""></div></div>
<nav>
    <a href="#" style="font-weight:700">Pranav Chaparala</a>
    <div class="nav-links"><a href="#">Work</a><a href="#">About</a><a href="#">Play</a></div>
</nav>
<div id="stage"></div>
<footer>
    <span>Product Designer | Parsons MFA DT</span>
    <span id="clock">00:00:00</span>
</footer>
<script>
const WORKS = [
    { title:"Echoes of Presence",  img:"echoesofpresence.png" },
    { title:"ClanX",               img:"clanx.png"            },
    { title:"Lectrix EV",          img:"lectrix.png"          },
    { title:"Nosie: Luna Ring",    img:"lunaring.png"         },
    { title:"Noise: View Buds",    img:"echoesofpresence.png" },
    { title:"OxygenOS 12",         img:"lectrix.png"          },
    { title:"Gudz Logistics",      img:"echoesofpresence.png" },
    { title:"Bezapp",              img:"clanx.png"            },
    { title:"Inka",                img:"lectrix.png"          },
    { title:"SĀR Rise Collection", img:"lunaring.png"         }
];

const N      = WORKS.length;
const GAP    = 60;
const WIDTHS = [255, 390]; // portrait, landscape
const sh     = i => i % 2 === 0 ? 'p' : 'l';
const w      = i => sh(i) === 'p' ? 255 : 390;

const stage  = document.getElementById('stage');
const bgBlur = document.getElementById('bg-blur');
const bgImg  = document.getElementById('bg-img');

// 25002500 BLUR GUARD 2500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500250025002500
// Blur is DISABLED during the loading sequence and only activates once
// the carousel is fully revealed. Set blurEnabled = true to allow hover blur.
// To change blur opacity, edit the '0.4' value in the mouseenter handler below.
let blurEnabled = false;
const VW     = window.innerWidth;
const VH     = window.innerHeight;

// ── Build card pool: enough to fill viewport + overflow on both sides ─────────
// We need cards spanning at least 3x viewport width
// Calculate how many N-cycles we need
const cycleW = WORKS.reduce((sum, _, i) => sum + w(i) + GAP, 0);
const numReps = Math.ceil((VW * 3) / cycleW) + 2;

// Create card elements
const cards = [];
for (let r = 0; r < numReps; r++) {
    WORKS.forEach((work, i) => {
        const gi   = r * N + i;
        const card = document.createElement('div');
        card.className = `card ${sh(gi)}`;
        card.innerHTML = `<div class="pan"><img src="./covers/${work.img}" alt="${work.title}"></div>`;
        card.dataset.workIdx = i;
        card.addEventListener('mouseenter', () => {
            if (!blurEnabled) return; // BLUR: disabled during loading sequence
            bgImg.src = `./covers/${work.img}`;
            bgBlur.style.opacity = '0.4'; // BLUR: change opacity here (0.0 - 1.0)
        });
        card.addEventListener('mouseleave', () => {
            if (!blurEnabled) return; // BLUR: disabled during loading sequence
            bgBlur.style.opacity = '0'; // BLUR: hides blur on mouse leave
        });
        stage.appendChild(card);
        cards.push(card);
    });
}

// ── Position cards absolutely left→right ─────────────────────────────────────
// x[i] = left edge of card i
let x = 0;
const cardX = cards.map((c, i) => {
    const cx = x;
    x += w(i % N) + GAP;
    return cx;
});
const totalW = x - GAP; // total width of all cards

// Find the card nearest to viewport center to use as "hero" anchor
// Hero = last work item (index N-1), in the middle repetition
const midRep   = Math.floor(numReps / 2);
const heroIdx  = midRep * N + (N - 1);  // last work of middle rep
const heroCard = cards[heroIdx];

// Offset so heroCard center = viewport center
const heroMid    = cardX[heroIdx] + w(heroIdx % N) / 2;
let   offset     = VW / 2 - heroMid;  // this is our scroll state

// Apply initial positions
function applyPositions() {
    cards.forEach((c, i) => {
        c.style.left = (cardX[i] + offset) + 'px';
        // parallax
        const cx  = cardX[i] + offset + w(i % N) / 2;
        const pan = c.querySelector('.pan');
        pan.style.transform = `translateX(${(cx - VW / 2) * 0.08}px)`;
    });
}
applyPositions();

// ── Hero always visible ───────────────────────────────────────────────────────
heroCard.style.opacity = '1';

// ── Fake overlay for loading sequence ────────────────────────────────────────
const overlay = document.createElement('div');
overlay.id = 'overlay';
document.body.appendChild(overlay);

const fakes = WORKS.map((work, i) => {
    const f = document.createElement('div');
    f.className = `fake ${sh(i)}`;
    f.style.zIndex = 100 + i;
    f.innerHTML = `<div class="pan"><img src="./covers/${work.img}" alt="${work.title}"></div>`;
    overlay.appendChild(f);
    return f;
});

// ── Loading sequence ──────────────────────────────────────────────────────────
const tl   = gsap.timeline({ onComplete: revealCarousel });
const STEP = 0.20, IN = 0.50, HOLD = 0.10, OUT = 0.28;

fakes.forEach((f, i) => {
    const t = i * STEP;
    tl.to(f, { scale: 1.02, duration: IN,  ease: 'power3.out'   }, t)
      .to(f, { scale: 1.0,  duration: OUT, ease: 'power2.inOut' }, t + IN + HOLD);
});

const seqEnd = (N - 1) * STEP + IN + HOLD + OUT;
tl.to(fakes.slice(0, -1), {
    opacity: 0, duration: 0.4,
    stagger: { each: 0.04, from: 'start' },
    ease: 'power2.in'
}, seqEnd + 0.3)
.to(fakes[N - 1], {
    opacity: 0, duration: 0.5,
    ease: 'power2.in'
});

// ── Reveal carousel ───────────────────────────────────────────────────────────
let vel      = 0;
let spinning = false;

function revealCarousel() {
    overlay.remove();

    // Sort cards by distance from hero, reveal outward
    const sorted = cards
        .filter(c => c !== heroCard)
        .sort((a, b) => {
            const ai = cards.indexOf(a);
            const bi = cards.indexOf(b);
            return Math.abs(ai - heroIdx) - Math.abs(bi - heroIdx);
        });

    gsap.to(sorted, {
        opacity: 1, duration: 0.6, stagger: 0.03, ease: 'power2.out',
        onComplete() {
            spinning = true;
            blurEnabled = true; // BLUR: enabled here once carousel is fully revealed
        }
    });

    gsap.to('nav, footer', { opacity: 1, duration: 0.8 });
}

// ── Scroll ────────────────────────────────────────────────────────────────────
window.addEventListener('wheel', e => { if (spinning) vel += e.deltaY * 0.05; });

// ── RAF: move cards, wrap individual cards when they go offscreen ─────────────
const BUFFER = 600; // px offscreen before repositioning

(function loop() {
    requestAnimationFrame(loop);
    if (!spinning) return;

    vel    *= 0.90;
    offset -= vel;

    // Reposition individual cards that have gone too far left or right
    // instead of jumping the whole track
    cards.forEach((c, i) => {
        let cx = cardX[i] + offset;
        // If card's right edge is off the left side, jump it to the right end
        if (cx + w(i % N) < -BUFFER) {
            cardX[i] += totalW + GAP;
        }
        // If card's left edge is off the right side, jump it to the left end
        if (cx > VW + BUFFER) {
            cardX[i] -= totalW + GAP;
        }
    });

    // Apply
    cards.forEach((c, i) => {
        const cx = cardX[i] + offset;
        c.style.left = cx + 'px';
        const pan = c.querySelector('.pan');
        pan.style.transform = `translateX(${(cx + w(i % N) / 2 - VW / 2) * 0.08}px)`;
    });
}());

// ── Clock ─────────────────────────────────────────────────────────────────────
setInterval(() => {
    document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-GB', { hour12: false });
}, 1000);
</script>
</body>
</html>
